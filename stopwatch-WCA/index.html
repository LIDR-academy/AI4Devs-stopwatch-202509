<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer and Countdown</title>
<link rel="stylesheet" href="styles.css">
<style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f9f9ff;
      font-family: Arial, sans-serif;
    }

    .display {
      background: #e7ebff;
      border: 8px solid #333;
      border-radius: 40px;
      padding: 30px 60px;
      font-size: 10rem;
      text-align: center;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      margin-bottom: 40px;
    }

    .milliseconds {
      font-size: 3rem;
      align-self: flex-end;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 60px;
    }

    button {
      border: none;
      font-size: 4rem;
      color: #000;
      padding: 20px 60px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }

    #start {
      background: #00ff00;
    }

    #start:hover {
      background: #00cc00;
    }

    #clear {
      background: #ff0000;
      color: #fff;
    }

    #clear:hover {
      background: #cc0000;
    }
  </style>
</head>
<body>
  <div class="display">
    <div id="time">00:00:00</div>
    <div class="milliseconds" id="ms">000</div>
  </div>

  <div class="buttons">
    <button id="start">Start</button>
    <button id="clear">Clear</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
