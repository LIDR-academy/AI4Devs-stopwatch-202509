<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="stopwatch-container">
        <h1>Stopwatch</h1>
        
        <!-- Timer Display -->
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        
        <!-- Control Buttons -->
        <div class="controls">
            <button id="startBtn" class="btn btn-start">Start</button>
            <button id="pauseBtn" class="btn btn-pause" disabled>Pause</button>
            <button id="clearBtn" class="btn btn-clear" disabled>Clear</button>
            <button id="lapBtn" class="btn btn-lap" disabled>Lap</button>
        </div>
        
        <!-- Lap Times List -->
        <div class="laps-container" id="lapsContainer">
            <h2>Lap Times</h2>
            <ul class="laps-list" id="lapsList"></ul>
        </div>
    </main>
    
    <script src="scripts.js"></script>
</body>
</html>
