<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cronómetro & Cuenta Atrás</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef1ff;
      --border: #333;
      --green: #17d427;
      --green-dark: #0f9f1b;
      --red: #ff2b2b;
      --red-dark: #c11f1f;
      --accent: #5a67d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: 'Roboto', system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      background: #f7f7fb;
      color: #111;
      display: grid;
      place-items: center;
    }
    .app {
      width: min(980px, 95vw);
    }
    .header {
      display: flex; 
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #222;
    }
    .mode {
      display: flex; gap: 8px; align-items: center;
    }
    .mode button {
      border: 2px solid var(--border);
      background: white;
      padding: 8px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .mode button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .display {
      width: 100%;
      background: var(--bg);
      border: 6px solid var(--border);
      border-radius: 28px;
      padding: clamp(12px, 3.5vw, 28px);
      text-align: center;
      margin: 6px 0 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,.08) inset;
    }
    .time {
      font-size: clamp(48px, 12vw, 140px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: .05em;
    }
    .millis {
      font-size: clamp(14px, 3vw, 36px);
      vertical-align: super;
      margin-left: .25em;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 10px;
    }
    .btn {
      border: 6px solid #333;
      border-radius: 26px;
      font-size: clamp(18px, 3.5vw, 40px);
      font-weight: 700;
      padding: clamp(10px, 2.8vw, 18px);
      cursor: pointer;
      transition: transform .05s ease, filter .1s ease;
      user-select: none;
    }
    .btn:active { transform: translateY(2px); }
    .btn-start { background: var(--green); }
    .btn-start:hover { filter: brightness(0.95); }
    .btn-stop { background: #ffd000; }
    .btn-clear { background: var(--red); }
    .btn-clear:hover { filter: brightness(0.95); }

    .countdown-inputs {
      display: grid;
      grid-template-columns: repeat(6, max-content);
      align-items: end;
      gap: 10px;
      margin: 10px 0 6px;
    }
    .field {
      display: grid;
      gap: 6px;
      justify-items: start;
    }
    label { font-size: 14px; font-weight: 700; color: #333; }
    input[type="number"] {
      width: 90px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 2px solid #aaa;
      font-size: 18px;
    }
    .tip {
      font-size: 12px;
      opacity: .7;
      margin-top: 6px;
    }

    @media (max-width: 560px) {
      .controls { grid-template-columns: 1fr; }
      .countdown-inputs { grid-template-columns: repeat(3, max-content); }
      input[type="number"] { width: 80px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>⏱️ Cronómetro & ⏳ Cuenta Atrás</h1>
      <div class="mode" role="tablist" aria-label="Modo">
        <button id="btnStopwatch" role="tab" class="active" aria-selected="true">Cronómetro</button>
        <button id="btnCountdown" role="tab" aria-selected="false">Cuenta Atrás</button>
      </div>
    </div>

    <div class="display" aria-live="polite">
      <span id="hhmmss" class="time">00:00:00</span><span id="ms" class="millis">000</span>
    </div>

    <section id="countdownSection" hidden>
      <div class="countdown-inputs">
        <div class="field">
          <label for="hh">Horas</label>
          <input id="hh" type="number" min="0" value="0" />
        </div>
        <div class="field">
          <label for="mm">Min</label>
          <input id="mm" type="number" min="0" max="59" value="1" />
        </div>
        <div class="field">
          <label for="ss">Seg</label>
          <input id="ss" type="number" min="0" max="59" value="0" />
        </div>
        <button id="btnSet" class="mode button-like">Establecer</button>
        <span class="tip">Sugerencia: Barra espaciadora = iniciar/pausar, R = reiniciar.</span>
      </div>
    </section>

    <div class="controls">
      <button id="btnStart" class="btn btn-start">Start</button>
      <button id="btnClear" class="btn btn-clear">Clear</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
