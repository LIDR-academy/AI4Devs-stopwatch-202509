<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: white;
    }

    #display {
      font-size: 10vw;
      background: #e8ebff;
      border: 5px solid #333;
      border-radius: 20px;
      padding: 10px 20px;
      display: inline-block;
      margin-bottom: 20px;
      box-sizing: border-box;
      min-width: 80%;
    }

    #milliseconds {
      font-size: 2vw;
      display: block;
      text-align: right;
      margin-top: -15px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      font-size: 2vw;
      padding: 15px 40px;
      border-radius: 15px;
      border: none;
      color: white;
      cursor: pointer;
      min-width: 150px;
      transition: background 0.3s ease;
    }

    /* Estados del botón principal */
    .start {
      background: limegreen;
    }

    .pause {
      background: limegreen;
    }

    .continue {
      background: dodgerblue;
    }

    /* Botón secundario */
    #clearBtn {
      background: red;
    }

    @media (max-width: 600px) {
      #display {
        font-size: 14vw;
      }
      #milliseconds {
        font-size: 4vw;
      }
      button {
        font-size: 5vw;
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div id="display">
    <span id="time">00:00:00</span>
    <span id="milliseconds">000</span>
  </div>

  <div class="buttons">
    <button id="mainBtn" class="start">Start</button>
    <button id="clearBtn">Clear</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
